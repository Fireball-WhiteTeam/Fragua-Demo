apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "embernet-probe.labels" . | nindent 4 }}
    # Same labels as on the pod template — both must have all five.
    {{- include "embernet-probe.storeLabels" . | nindent 4 }}
  annotations:
    embernet.ai/display-name: {{ .Values.gui.displayName | default "EmberNET Network Probe" | quote }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    {{- include "embernet-probe.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
