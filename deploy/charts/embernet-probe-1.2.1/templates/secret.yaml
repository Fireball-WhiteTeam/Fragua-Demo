apiVersion: v1
kind: Secret
metadata:
  name: {{ include "embernet-probe.fullname" . }}-secret
  labels:
    {{- include "embernet-probe.labels" . | nindent 4 }}
type: Opaque
data:
  # The JWT token used by the dashboard for application-level auth
  PROBE_TOKEN: {{ .Values.probe.token | b64enc | quote }}
  {{- if not .Values.provisioner.enabled }}
  # The OpenZiti Edge Identity (JSON format, base64 encoded string provided in values).
  # Only populated when provisioner.enabled=false. When enabled, the identity
  # comes from the ziti-enroller initContainer at runtime.
  ziti-identity.json: {{ .Values.probe.zitiIdentityBase64 | quote }}
  {{- end }}
